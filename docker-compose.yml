# Interview9ai - Docker Compose (local development)
# For Azure deployment, use deploy-interview9ai.sh

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - CORS_ORIGIN=http://localhost:5173

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.azure
    ports:
      - "80:80"
    environment:
      - API_BACKEND_URL=http://server:3001
    depends_on:
      - server

# Interview9.ai nginx configuration
# Per TGM Unified Architecture Section 12.8

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # API reverse proxy — routes /api/* to internal API container
    location /api/ {
        proxy_pass http://${API_INTERNAL_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Static assets (Vite hashes filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health.txt {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
